name: "Checkout source tree"
description: "Checkout repository contents for workflows"

inputs:
    ref:
        description: "Git ref to check out"
        required: false
        default: ""

runs:
    using: "composite"
    steps:
        - name: "Checkout code (input ref)"
          if: ${{ inputs.ref != '' }}
          uses: actions/checkout@v6
          with:
              ref: ${{ inputs.ref }}

        - name: "Checkout code (current commit)"
          if: ${{ inputs.ref == '' }}
          uses: actions/checkout@v6