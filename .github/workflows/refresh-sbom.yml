name: "Refresh Project SBOM"

on:
    workflow_dispatch:
        inputs:
            reason:
                description: "Reason for manual SBOM refresh"
                required: false
                default: "manual-dispatch"
                type: choice
                options:
                    - "manual-dispatch"
                    - "pre-release"
                    - "other"
    schedule:
        - cron: "42 5 * * 1"
    workflow_run:
        workflows:
            - "Bump Dependencies (Minor/Patch)"
            - "Bump Dependencies (Major)"
        types:
            - completed

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: "refresh-sbom"
    cancel-in-progress: false

jobs:
    refresh-sbom:
        name: "Refresh project SBOM"
        if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest

        steps:
            # Checkout source code
            - name: "Checkout default branch"
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.event.repository.default_branch }}

            # Generate SBOM but don't commit to avoid invalidating the check results of the last commit.
            # Otherwise a PR could never be merged.
            - name: "Generate SBOM without committing"
              uses: ./.github/actions/generate-project-sbom
              with:
                  commit-changes: "false"
                  upload-artifact: "true"

            # Determine reason for updating the SBOM so that it can be mentioned in the new PR.
            - name: "Determine refresh reason"
              id: trigger-context
              shell: bash
              run: |
                  case "${{ github.event_name }}" in
                      workflow_run)
                          echo "reason=after-${{ github.event.workflow_run.name }}" >> "$GITHUB_OUTPUT"
                          ;;
                      schedule)
                          echo "reason=weekly-schedule" >> "$GITHUB_OUTPUT"
                          ;;
                      workflow_dispatch)
                          if [[ -n "${{ inputs.reason }}" ]]; then
                              echo "reason=${{ inputs.reason }}" >> "$GITHUB_OUTPUT"
                          else
                              echo "reason=manual-dispatch" >> "$GITHUB_OUTPUT"
                          fi
                          ;;
                      *)
                          echo "reason=unknown-trigger" >> "$GITHUB_OUTPUT"
                          ;;
                  esac

            # Commit new SBOM via a new PR
            - name: "Commit SBOM changes and create or update pull request"
              env:
                  GH_TOKEN: ${{ secrets.RENOVATE_TOKEN != '' && secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
                  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
                  REFRESH_REASON: ${{ steps.trigger-context.outputs.reason }}
              shell: bash
              run: |
                  if git diff --quiet -- sbom/openbook.cyclonedx.json; then
                      echo "No SBOM changes detected."
                      exit 0
                  fi

                  BRANCH_NAME="chore/sbom-refresh"
                  COMMIT_MESSAGE="chore(sbom): regenerate project sbom"
                  PR_TITLE="chore(sbom): refresh project SBOM"

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                  git checkout -B "$BRANCH_NAME"
                  git add sbom/openbook.cyclonedx.json
                  git commit -m "$COMMIT_MESSAGE"

                  git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git push --force-with-lease origin "$BRANCH_NAME"

                  PR_BODY="$(printf 'Automated refresh of \`sbom/openbook.cyclonedx.json\`.\n\nTrigger: \`%s\`\nBase branch: \`%s\`\nWorkflow run: https://github.com/%s/actions/runs/%s\n' "$REFRESH_REASON" "$DEFAULT_BRANCH" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"

                  PR_NUMBER="$(
                      gh pr list \
                          --head "$BRANCH_NAME" \
                          --base "$DEFAULT_BRANCH" \
                          --state open \
                          --json number \
                          --jq '.[0].number'
                  )"

                  if [[ -z "$PR_NUMBER" ]]; then
                      gh pr create \
                          --title "$PR_TITLE" \
                          --body "$PR_BODY" \
                          --base "$DEFAULT_BRANCH" \
                          --head "$BRANCH_NAME"
                  else
                      gh pr edit "$PR_NUMBER" \
                          --title "$PR_TITLE" \
                          --body "$PR_BODY"
                  fi

            # Auto-merge the PR, since it doesn't contain runtime code changes
            - name: "Enable auto-merge for SBOM PR"
              if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
              env:
                  GH_TOKEN: ${{ secrets.RENOVATE_TOKEN != '' && secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
              shell: bash
              run: |
                  BRANCH_NAME="chore/sbom-refresh"
                  DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"

                  PR_NUMBER="$(
                  gh pr list \
                      --head "$BRANCH_NAME" \
                      --base "$DEFAULT_BRANCH" \
                      --state open \
                      --json number \
                      --jq '.[0].number'
                  )"

                  if [[ -n "$PR_NUMBER" ]]; then
                  gh pr merge "$PR_NUMBER" \
                      --auto \
                      --squash \
                      --delete-branch
                  fi
