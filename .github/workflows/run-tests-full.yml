name: "Run Full Test Suite"

on:
    workflow_call:

permissions:
    contents: write

jobs:
    run-full-test-suite:
        name: "Run full test suite"
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:8-alpine@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72
                ports:
                    - 6379:6379

        steps:
            # Must be first, so that GH actions finds our local actions!
            - name: "Checkout code"
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.head_ref || github.ref }}

            - name: "Set up CI environment"
              uses: ./.github/actions/setup-ci-environment
              with:
                  setup-python: "true"
                  setup-node: "true"

            - name: "Regenerate project SBOM"
              uses: ./.github/actions/generate-project-sbom
              with:
                  commit-changes: "false"
                  upload-artifact: "true"

            - name: "Run all checks and tests"
              run: |
                  npm run check
