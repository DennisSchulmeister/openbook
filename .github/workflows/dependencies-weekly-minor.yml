name: "Dependency Updates (Weekly Minor/Patch)"

on:
    workflow_dispatch:
    schedule:
        - cron: "0 4 * * 1"

permissions:
    contents: write
    pull-requests: write

concurrency:
    group: "dependency-updates-weekly"
    cancel-in-progress: true

jobs:
    update-dependencies:
        name: "Update dependencies"
        runs-on: ubuntu-latest

        outputs:
            pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
            pr_operation: ${{ steps.create_pr.outputs.pull-request-operation }}
            pr_branch: ${{ steps.create_pr.outputs.pull-request-branch }}

        steps:
            # Must be first, so that GH actions finds our local actions!
            - name: "Checkout code"
              uses: actions/checkout@v6

            - name: "Set up CI environment"
              uses: ./.github/actions/setup-ci-environment

            - name: "Update Python dependencies (minor/patch within constraints)"
              run: poetry update

            - name: "Update root/workspace npm dependencies (minor/patch)"
              run: npm update --workspaces --include-workspace-root --legacy-peer-deps

            - name: "Generate whole-project SBOM"
              uses: ./.github/actions/generate-project-sbom

            - name: "Create or update pull request"
              id: create_pr
              uses: peter-evans/create-pull-request@v8
              with:
                  # Automatically created by GH Actions with a short-lived token. Usage rights determined
                  # by the permissions defined at the top of the workflow file.
                  token: ${{ secrets.GITHUB_TOKEN }}
                  branch: "ci/deps-weekly-minor-patch"
                  delete-branch: true
                  commit-message: "chore(deps): weekly minor and patch updates"
                  title: "chore(deps): weekly minor and patch updates"
                  body: |
                        ## Summary

                        This PR was created automatically by the weekly dependency update workflow.
                        It updates dependencies to the latest patch/minor versions permitted by the current constraints.
                        The whole-project CycloneDX SBOM at `sbom/openbook.cyclonedx.json` is updated to reflect the new dependency versions.

                        ## Validation

                        Unit tests are executed by the reusable test workflow.
                  labels: |
                        dependencies
                        automated
                        weekly-update

    run-tests:
        name: "Run tests"
        needs: update-dependencies
        if: ${{ needs.update-dependencies.outputs.pr_operation == 'created' || needs.update-dependencies.outputs.pr_operation == 'updated' }}
        uses: ./.github/workflows/reusable-tests.yml
        with:
            ref: ${{ needs.update-dependencies.outputs.pr_branch }}

    auto-merge:
        name: "Auto merge PR"
        needs: [update-dependencies, run-tests]
        if: ${{ needs.run-tests.result == 'success' && (needs.update-dependencies.outputs.pr_operation == 'created' || needs.update-dependencies.outputs.pr_operation == 'updated') }}
        runs-on: ubuntu-latest

        permissions:
            contents: write
            pull-requests: write

        steps:
            # Only works if there are no branch protection rules that require explicit approval before merging PRs.
            # If there are, "Allow specified actors to bypass required pull requests" can be checked in the branch
            # protection rules.
            - name: "Merge dependency update pull request"
              run: |
                  gh pr merge "${{ needs.update-dependencies.outputs.pr_number }}" \
                      --squash \
                      --delete-branch \
                      --repo "${{ github.repository }}"
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
