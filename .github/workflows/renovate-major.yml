name: "Bump Dependencies (Major)"

on:
    workflow_dispatch:
    schedule:
        - cron: "17 4 1 * *"

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    renovate:
        name: "Bump Dependencies (Major)"
        runs-on: ubuntu-latest

        steps:
            - name: "Checkout code"
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.head_ref }}

            - name: "Run Renovate"
              uses: renovatebot/github-action@v46
              with:
                  configurationFile: renovate.json
                  token: ${{ secrets.RENOVATE_TOKEN }}
              env:
                  LOG_LEVEL: "info"
                  NPM_CONFIG_LEGACY_PEER_DEPS: "true"
                  RENOVATE_PACKAGE_RULES: >-
                      [{"matchUpdateTypes":["digest","minor","patch","pin","pinDigest","lockFileMaintenance"],"enabled":false}]