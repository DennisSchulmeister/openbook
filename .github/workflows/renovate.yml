name: "Renovate"

on:
    workflow_dispatch:
    schedule:
        - cron: "17 * * * *"

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    renovate:
        name: "Run Renovate"
        runs-on: ubuntu-latest

        steps:
            - name: "Run Renovate"
              uses: renovatebot/github-action@v46
              with:
                  configurationFile: renovate.json
                  token: ${{ secrets.RENOVATE_TOKEN }}
              env:
                  LOG_LEVEL: "info"
                  NPM_CONFIG_LEGACY_PEER_DEPS: "true"