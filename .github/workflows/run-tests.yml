name: "Run Tests"

on:
    workflow_dispatch: {}
    pull_request: {}

permissions:
    contents: write

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    # Job name used in the branch protection rules of the repo
    tests:
        runs-on: ubuntu-latest

        services:
            redis:
                image: redis:7-alpine@sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
                ports:
                    - 6379:6379

        steps:
            # Must be first, so that GH actions finds our local actions!
            - name: "Checkout code"
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.head_ref }}

            - name: "Set up CI environment"
              uses: ./.github/actions/setup-ci-environment
              with:
                  setup-python: "true"
                  setup-node: "true"

            - name: "Regenerate project SBOM"
              uses: ./.github/actions/generate-project-sbom

            - name: "Run all checks and tests"
              run: |
                  npm run check